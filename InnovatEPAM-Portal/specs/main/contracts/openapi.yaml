openapi: 3.0.3
info:
  title: InnovatEPAM Portal API
  version: 0.1.0
  description: Core authentication, idea submission, listing, draft, and review endpoints for the InnovatEPAM Portal feature.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Service health check
      responses:
        '200':
          description: Backend is healthy
  /api/auth/register:
    post:
      summary: Register a submitter account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User registered
        '400':
          description: Validation failure or duplicate email
  /api/auth/login:
    post:
      summary: Login and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
  /api/auth/logout:
    post:
      summary: Stateless logout acknowledgement
      responses:
        '200':
          description: Logout successful
  /api/ideas:
    get:
      summary: List ideas for the current user or privileged reviewer
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Idea list returned
        '401':
          description: Missing or invalid token
    post:
      summary: Submit a new idea with optional attachment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, description, category]
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Idea submitted
        '400':
          description: Validation failure
  /api/ideas/{id}:
    get:
      summary: Retrieve idea details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Idea returned
        '404':
          description: Idea not found
  /api/ideas/{id}/status:
    put:
      summary: Update idea status
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status updated
        '403':
          description: Role not permitted
  /api/ideas/{id}/file:
    get:
      summary: Download an idea attachment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Attachment returned
        '404':
          description: Attachment missing
  /api/ideas/drafts:
    get:
      summary: List drafts for the current submitter
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Draft list returned
    post:
      summary: Save a draft
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Draft saved
  /api/ideas/drafts/{id}:
    put:
      summary: Update a draft
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Draft updated
  /api/ideas/drafts/{id}/submit:
    post:
      summary: Submit an existing draft
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Draft submitted
  /api/ideas/stages/config:
    get:
      summary: Get global stage configuration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stage configuration returned
    put:
      summary: Update global stage configuration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stage configuration updated
  /api/ideas/{id}/stages/decision:
    put:
      summary: Approve or reject the current stage
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stage decision saved
  /api/ideas/{id}/stages/score:
    put:
      summary: Score the current stage
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stage score saved
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT